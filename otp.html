<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>OTP Verification</title>

    <style>
        body{
            font-family:'Nunito',sans-serif;
        }
    </style>

</head>

<body class="bg-purple-600 min-h-screen flex items-center justify-center">

<div class="bg-white w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">

    <div class="text-center">

        <div class="w-20 h-20 rounded-full bg-indigo-600 text-white flex items-center justify-center mx-auto text-3xl shadow-lg">
            🔐
        </div>

        <h1 class="text-3xl font-extrabold mt-5">
            Verify OTP
        </h1>

        <p class="text-gray-500 mt-2">
            Enter the 6-digit code sent to your email.
        </p>

    </div>

    <form class="mt-8">

        <div class="flex justify-center gap-3">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

            <input type="text" maxlength="1" class="w-12 h-12 border rounded-xl text-center text-xl font-bold focus:ring-2 focus:ring-indigo-500 outline-none">

        </div>

        <button class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mt-8 hover:bg-indigo-700 duration-300">
            Verify OTP
        </button>

    </form>

    <p class="text-center mt-6 text-gray-600">
        Didn't receive the code?

        <a href="#" class="text-indigo-600 font-bold hover:underline">
            Resend OTP
        </a>
    </p>

</div>

</body>
</html>
