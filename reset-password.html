<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Reset Password</title>

    <style>
        body{
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex justify-center items-center">

    <div class="bg-white w-[90%] max-w-md rounded-3xl shadow-2xl p-8">

        <div class="text-center">

            <div class="w-20 h-20 bg-purple-600 rounded-full flex items-center justify-center text-white text-3xl mx-auto shadow-lg">
                🔑
            </div>

            <h1 class="text-3xl font-extrabold mt-5">
                Reset Password
            </h1>

            <p class="text-gray-500 mt-2">
                Create a new password for your account.
            </p>

        </div>

        <form class="mt-8 space-y-5">

            <div>
                <label class="font-semibold text-gray-700">
                    New Password
                </label>

                <input
                    type="password"
                    placeholder="Enter new password"
                    class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <div>
                <label class="font-semibold text-gray-700">
                    Confirm Password
                </label>

                <input
                    type="password"
                    placeholder="Confirm new password"
                    class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
            </div>

            <button
                class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 duration-300">
                Reset Password
            </button>

        </form>

        <p class="text-center mt-6 text-gray-600">
            Back to
            <a href="login.html" class="text-purple-600 font-bold hover:underline">
                Login
            </a>
        </p>

    </div>

</body>
</html>
