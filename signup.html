<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Sign Up</title>

    <style>
        body{
            font-family:'Nunito',sans-serif;
        }
    </style>
</head>

<body class="bg-white flex justify-center items-center min-h-screen">

<div class="bg-white w-[90%] max-w-md rounded-3xl shadow-2xl p-8">

    <div class="text-center">
        <div class="w-20 h-20 bg-purple-600 rounded-full flex justify-center items-center mx-auto text-white text-3xl font-bold shadow-lg">
            L
        </div>

        <h1 class="text-3xl font-extrabold mt-5">
            Create Account
        </h1>

        <p class="text-gray-500 mt-2">
            Join us today
        </p>
    </div>

    <form class="mt-8 space-y-5">

        <div>
            <label class="font-semibold text-gray-700">Full Name</label>

            <input
            type="text"
            placeholder="Enter your full name"
            class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <div>
            <label class="font-semibold text-gray-700">Email</label>

            <input
            type="email"
            placeholder="Enter your email"
            class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <div>
            <label class="font-semibold text-gray-700">Password</label>

            <input
            type="password"
            placeholder="Create password"
            class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <div>
            <label class="font-semibold text-gray-700">Confirm Password</label>

            <input
            type="password"
            placeholder="Confirm password"
            class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-purple-500">
        </div>

        <button
        class="w-full bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700 duration-300">
            Create Account
        </button>

    </form>

    <p class="text-center mt-6 text-gray-600">
        Already have an account?

        <a href="login.html"
        class="text-purple-600 font-bold hover:underline">
            Login
        </a>
    </p>

</div>

</body>
</html>
