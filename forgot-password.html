<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Forgot Password</title>

    <style>
        body{
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body class="bg-blue flex justify-center items-center min-h-screen">

    <div class="bg-white w-[90%] max-w-md p-8 rounded-3xl shadow-2xl">

        <div class="text-center">

            <div class="w-20 h-20 bg-cyan-600 text-white rounded-full flex items-center justify-center text-3xl font-bold mx-auto shadow-lg">
                🔒
            </div>

            <h1 class="text-3xl font-extrabold mt-5">
                Forgot Password?
            </h1>

            <p class="text-gray-500 mt-2">
                Enter your email address to receive an OTP.
            </p>

        </div>

        <form class="mt-8 space-y-5">

            <div>
                <label class="font-semibold text-gray-700">
                    Email Address
                </label>

                <input
                    type="email"
                    placeholder="Enter your email"
                    class="w-full mt-2 p-3 border rounded-xl outline-none focus:ring-2 focus:ring-cyan-500">
            </div>

            <a href="otp.html">
                <button
                    type="button"
                    class="w-full bg-cyan-600 text-white py-3 rounded-xl font-bold hover:bg-cyan-700 duration-300">
                    Send OTP
                </button>
            </a>

        </form>

        <p class="text-center mt-6 text-gray-600">
            Remember your password?
            <a href="login.html" class="text-cyan-600 font-bold hover:underline">
                Back to Login
            </a>
        </p>

    </div>

</body>
</html>
