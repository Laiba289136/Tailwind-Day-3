<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Login</title>

    <style>
        body{
            font-family: 'Nunito', sans-serif;
        }
    </style>
</head>

<body class="bg-white flex items-center justify-center min-h-screen">

<div class="bg-white w-[90%] max-w-md rounded-3xl shadow-2xl p-8">

    <div class="text-center">
        <div class="w-20 h-20 rounded-full bg-indigo-600 text-white text-3xl font-bold flex items-center justify-center mx-auto shadow-lg">
            L
        </div>

        <h1 class="text-3xl font-extrabold mt-5">
            Welcome Back
        </h1>

        <p class="text-gray-500 mt-2">
            Login to continue
        </p>
    </div>

    <form class="mt-8 space-y-5">

        <div>
            <label class="font-semibold text-gray-700">
                Email
            </label>

            <input
                type="email"
                placeholder="Enter your email"
                class="w-full mt-2 p-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div>
            <label class="font-semibold text-gray-700">
                Password
            </label>

            <input
                type="password"
                placeholder="Enter your password"
                class="w-full mt-2 p-3 rounded-xl border border-gray-300 outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <div class="flex justify-between items-center text-sm">

            <label class="flex items-center gap-2">
                <input type="checkbox">
                Remember me
            </label>

            <a href="forgot-password.html" class="text-indigo-600 font-semibold hover:underline">
                Forgot Password?
            </a>

        </div>

        <button class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 duration-300">
            Login
        </button>

    </form>

    <p class="text-center mt-6 text-gray-600">
        Don't have an account?
        <a href="signup.html" class="text-indigo-600 font-bold hover:underline">
            Sign Up
        </a>
    </p>

</div>

</body>
</html>
